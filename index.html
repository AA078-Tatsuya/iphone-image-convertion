      if(b[i]===0xFF&&b[i+1]===0xD8&&b[i+2]===0xFF){
        const start=i;let j=i+2,end=-1;
        while(j<len-1){if(b[j]===0xFF&&b[j+1]===0xD9){end=j+2;break;}j++;}
        if(end===-1)break;
        if(end-start>bestSize){bestSize=end-start;best={start,end};}
        i=end;
      }else i++;
    }
    if(!best||bestSize<1024)return null;
    return new Blob([b.slice(best.start,best.end)],{type:'image/jpeg'});
  }

  async function convertFile(file){
    const t=i18n[currentLang];
    const item=document.createElement('div');item.className='item';
    const baseName=file.name.replace(/\.[^.]+$/,'');
    const ext=targetFormat==='jpeg'?'jpg':'png';
    const mime=targetFormat==='jpeg'?'image/jpeg':'image/png';
    const outName=`${baseName}.${ext}`;const srcExt=getExt(file.name);
    item.innerHTML=`<div class="thumb"></div><div class="item-info"><div class="item-name">${file.name}</div></div><span class="status"><span class="spinner"></span>${t.converting}</span>`;
    results.prepend(item);
    try{
      let sourceBlob=file;
      const isHeic=/\.(heic|heif)$/i.test(file.name)||file.type==='image/heic'||file.type==='image/heif';
      const isRaw=RAW_EXT.includes(srcExt);
      if(isHeic){let r=await heic2any({blob:file,toType:'image/png'});if(Array.isArray(r))r=r[0];sourceBlob=r;}
      else if(isRaw){const buf=await file.arrayBuffer();const j=extractEmbeddedJpeg(buf);if(!j)throw new Error('NO_PREVIEW');sourceBlob=j;}
      const finalBlob=await processImage(sourceBlob,mime);
      convertedFiles.push({name:outName,blob:finalBlob});
      const url=URL.createObjectURL(finalBlob);
      const savedPct=file.size>0?Math.round((1-finalBlob.size/file.size)*100):0;
      const savedTxt=savedPct>0?` · <span class="saved">−${savedPct}% ${t.saved}</span>`:'';
      item.innerHTML=`<img class="thumb" src="${url}" alt=""><div class="item-info"><div class="item-name">${outName}</div><div class="item-meta">${fmtSize(finalBlob.size)}${savedTxt}</div></div><a class="dl" href="${url}" download="${outName}">${t.download}</a>`;
      actions.classList.add('show');
    }catch(err){
      console.error(err);
      const msg=(err&&err.message==='NO_PREVIEW')?t.noPreview:t.failed;
      item.innerHTML=`<div class="thumb"></div><div class="item-info"><div class="item-name">${file.name}</div></div><span class="err">⚠️ ${msg}</span>`;
    }
  }

  function processImage(blob,mime){
    return new Promise((resolve,reject)=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;const mode=resizeMode.value,val=parseFloat(resizeValue.value);
        if(mode!=='none'&&val>0){
          if(mode==='maxwidth'&&w>val){h=Math.round(h*(val/w));w=val;}
          else if(mode==='maxheight'&&h>val){w=Math.round(w*(val/h));h=val;}
          else if(mode==='percent'){w=Math.round(w*val/100);h=Math.round(h*val/100);}
        }
        const c=document.createElement('canvas');c.width=w;c.height=h;
        const ctx=c.getContext('2d');
        if(mime==='image/jpeg'){ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);}
        ctx.drawImage(img,0,0,w,h);
        const q=parseInt(qualitySlider.value)/100;
        c.toBlob(b=>b?resolve(b):reject('toBlob failed'),mime,mime==='image/jpeg'?q:undefined);
      };
      img.onerror=reject;img.src=URL.createObjectURL(blob);
    });
  }

  document.getElementById('zipBtn').addEventListener('click',async()=>{
    if(!convertedFiles.length)return;
    const zip=new JSZip(),nc={};
    convertedFiles.forEach(f=>{
      let name=f.name;
      if(nc[name]!==undefined){nc[name]++;const d=name.lastIndexOf('.');name=name.slice(0,d)+'_'+nc[name]+name.slice(d);}
      else nc[name]=0;
      zip.file(name,f.blob);
    });
    const content=await zip.generateAsync({type:'blob'});
    const url=URL.createObjectURL(content);const a=document.createElement('a');
    a.href=url;a.download='converted_images.zip';a.click();URL.revokeObjectURL(url);
  });

  document.getElementById('clearBtn').addEventListener('click',()=>{
    convertedFiles=[];results.innerHTML='';actions.classList.remove('show');fileInput.value='';
  });
</script>
